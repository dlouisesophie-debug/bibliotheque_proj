<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #dc3545; color: white; padding: 10px; text-align: center; }
        .content { padding: 20px; background: #f8f9fa; }
        .warning { color: #dc3545; font-weight: bold; }
        .footer { text-align: center; padding: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>⚠️ Rappel - Retour de livre en retard</h2>
        </div>
        <div class="content">
            <p>Bonjour {{ utilisateur.username }},</p>
            <p>Le livre suivant n'a pas été retourné à temps :</p>
            <h3>{{ livre.titre }}</h3>
            <p><strong>Date de retour prévue :</strong> {{ date_retour_prevue|date:"d/m/Y" }}</p>
            <p class="warning">Veuillez retourner le livre dès que possible.</p>
        </div>
        <div class="footer">
            <p>© 2025 Bibliothèque - Tous droits réservés</p>
        </div>
    </div>
</body>
</html>
